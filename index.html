<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Card Tracker" />
<title>Card Tracker</title>
<style>
:root {
  --bg:#F5F4F0; --surface:#fff; --surface2:#EFEFEA;
  --border:rgba(0,0,0,0.09); --border2:rgba(0,0,0,0.15);
  --text:#1A1A18; --text2:#6B6B66; --text3:#A0A09A;
  --hdfc:#1A56C4; --hdfc-bg:#EBF0FC; --hdfc-t:#0F3580;
  --sbi:#267A3E; --sbi-bg:#E8F5EC; --sbi-t:#145227;
  --one:#C05A10; --one-bg:#FDF0E7; --one-t:#7A3308;
  --accent:#5B4FCF; --accent-bg:#EDEAFC; --accent-t:#2D2280;
  --danger:#C0392B; --danger-bg:#FDECEB;
  --success-bg:#E8F5EC; --warn-bg:#FDF0E7;
  --r:14px; --rsm:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.header{background:var(--surface);padding:calc(env(safe-area-inset-top,0px) + 14px) 18px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header-row{display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:19px;font-weight:700}
.header-sub{font-size:11px;color:var(--text3);margin-top:2px}
.clr-btn{font-size:12px;color:var(--danger);background:var(--danger-bg);border:none;border-radius:20px;padding:5px 12px;cursor:pointer;font-weight:500}
.tab-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 18px}
.tab-item{flex:1;text-align:center;padding:11px 0;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab-item.active{color:var(--accent);border-color:var(--accent)}
.content{padding:14px 15px calc(env(safe-area-inset-bottom,0px) + 80px)}
.view{display:none}.view.active{display:block}
.sec-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin:16px 0 7px 2px}
.sec-label:first-child{margin-top:2px}
.card-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.card-opt{border:1.5px solid var(--border2);border-radius:var(--rsm);padding:10px 7px;cursor:pointer;background:var(--surface);text-align:center;transition:all .15s;user-select:none;-webkit-user-select:none}
.card-dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-bottom:3px}
.card-name{font-size:13px;font-weight:700;display:block}
.card-meta{font-size:10px;color:var(--text3);margin-top:2px;line-height:1.5}
.card-opt.sel-hdfc{border-color:var(--hdfc);background:var(--hdfc-bg)}
.card-opt.sel-hdfc .card-name{color:var(--hdfc-t)}
.card-opt.sel-sbi{border-color:var(--sbi);background:var(--sbi-bg)}
.card-opt.sel-sbi .card-name{color:var(--sbi-t)}
.card-opt.sel-onecard{border-color:var(--one);background:var(--one-bg)}
.card-opt.sel-onecard .card-name{color:var(--one-t)}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.cat-opt{border:1px solid var(--border2);border-radius:var(--rsm);padding:8px 3px 7px;cursor:pointer;background:var(--surface);text-align:center;font-size:11px;color:var(--text2);font-weight:500;line-height:1.3;user-select:none;-webkit-user-select:none}
.ci{font-size:17px;display:block;margin-bottom:2px}
.cat-opt.active{border-color:var(--accent);background:var(--accent-bg);color:var(--accent-t)}
.form-group{margin-bottom:9px}
.form-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;display:block}
.form-input{width:100%;padding:12px 13px;border:1.5px solid var(--border2);border-radius:var(--rsm);font-size:15px;color:var(--text);background:var(--surface);outline:none;-webkit-appearance:none}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--text3)}
.form-row2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.add-btn{width:100%;padding:14px;background:var(--text);color:#fff;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;margin-top:5px}
.add-btn:active{opacity:.85}
.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 88px);left:50%;transform:translateX(-50%) translateY(16px);background:var(--text);color:#fff;font-size:13px;font-weight:500;padding:10px 20px;border-radius:30px;opacity:0;transition:all .25s;z-index:999;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.filter-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.filter-chip{white-space:nowrap;font-size:12px;font-weight:500;padding:6px 13px;border-radius:20px;border:1px solid var(--border2);background:var(--surface);cursor:pointer;color:var(--text2);flex-shrink:0}
.filter-chip.active{background:var(--text);color:#fff;border-color:var(--text)}
.entry-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--rsm);padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;gap:9px}
.entry-icon{font-size:21px;width:34px;text-align:center;flex-shrink:0}
.entry-body{flex:1;min-width:0}
.entry-desc{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.entry-meta{font-size:11px;color:var(--text3);margin-top:2px;display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
.badge-hdfc{background:var(--hdfc-bg);color:var(--hdfc-t)}
.badge-sbi{background:var(--sbi-bg);color:var(--sbi-t)}
.badge-onecard{background:var(--one-bg);color:var(--one-t)}
.entry-right{text-align:right;flex-shrink:0}
.entry-amt{font-size:15px;font-weight:600}
.del-btn{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;padding:2px 0;display:block;margin-top:3px}
.empty-state{text-align:center;padding:50px 20px;color:var(--text3)}
.empty-state .ei{font-size:38px;margin-bottom:10px}
.empty-state p{font-size:14px;line-height:1.6}
.grand-total{background:var(--text);color:#fff;border-radius:var(--rsm);padding:13px 15px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.grand-label{font-size:12px;font-weight:600;opacity:.7}
.grand-amt{font-size:22px;font-weight:700}
.sum-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:4px}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rsm);padding:11px 9px;text-align:center}
.sum-card-label{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.07em}
.sum-card-amt{font-size:15px;font-weight:600;margin-top:3px}
.sum-card-sub{font-size:10px;color:var(--text3);margin-top:2px}
.bill-card{border-radius:var(--rsm);padding:11px 13px;margin-bottom:7px;border:1px solid}
.bill-card.ok{background:var(--success-bg);border-color:#9FE1CB}
.bill-card.warn{background:var(--warn-bg);border-color:#FAC775}
.bill-card.due{background:var(--danger-bg);border-color:#F7C1C1}
.bill-top{display:flex;justify-content:space-between;align-items:center}
.bill-name{font-size:14px;font-weight:700}
.bill-amt{font-size:13px;font-weight:600}
.bill-detail{font-size:11px;margin-top:4px;opacity:.75;line-height:1.6}
.prog-item{margin-bottom:11px}
.prog-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.prog-name{color:var(--text2);font-weight:500}
.prog-val{color:var(--text3)}
.prog-bar{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;background:var(--accent)}
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div>
      <h1>💳 Card Tracker</h1>
      <div class="header-sub" id="hdr-sub"></div>
    </div>
    <button class="clr-btn" id="clr-btn">Clear all</button>
  </div>
</div>

<div class="tab-bar">
  <div class="tab-item active" id="tab-add">Add</div>
  <div class="tab-item" id="tab-log">Log</div>
  <div class="tab-item" id="tab-summary">Summary</div>
</div>

<div class="content">
  <!-- ADD TAB -->
  <div class="view active" id="view-add">
    <div class="sec-label">Select card</div>
    <div class="card-row">
      <div class="card-opt" id="co-hdfc">
        <span class="card-dot" style="background:var(--hdfc)"></span>
        <span class="card-name">HDFC</span>
        <div class="card-meta">Stmt: 2nd<br>Due: 22nd</div>
      </div>
      <div class="card-opt" id="co-sbi">
        <span class="card-dot" style="background:var(--sbi)"></span>
        <span class="card-name">SBI</span>
        <div class="card-meta">Stmt: 7th<br>Due: 27th</div>
      </div>
      <div class="card-opt" id="co-onecard">
        <span class="card-dot" style="background:var(--one)"></span>
        <span class="card-name">OneCard</span>
        <div class="card-meta">Stmt: 22nd<br>Due: 9th↗</div>
      </div>
    </div>

    <div class="sec-label">Category</div>
    <div class="cat-grid" id="cat-grid"></div>

    <div class="sec-label">Details</div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <input class="form-input" type="text" id="inp-desc" placeholder="e.g. Big Bazaar, Swiggy, BPCL…" autocomplete="off"/>
    </div>
    <div class="form-row2">
      <div class="form-group">
        <label class="form-label">Amount (₹)</label>
        <input class="form-input" type="number" id="inp-amt" placeholder="0" inputmode="decimal" min="0"/>
      </div>
      <div class="form-group">
        <label class="form-label">Date</label>
        <input class="form-input" type="date" id="inp-date"/>
      </div>
    </div>
    <button class="add-btn" id="add-btn">+ Add Expense</button>
  </div>

  <!-- LOG TAB -->
  <div class="view" id="view-log">
    <div class="sec-label">Filter by card</div>
    <div class="filter-row" id="filter-row">
      <div class="filter-chip active" data-filter="all">All</div>
      <div class="filter-chip" data-filter="hdfc">HDFC</div>
      <div class="filter-chip" data-filter="sbi">SBI</div>
      <div class="filter-chip" data-filter="onecard">OneCard</div>
    </div>
    <div id="log-list"></div>
  </div>

  <!-- SUMMARY TAB -->
  <div class="view" id="view-summary">
    <div class="sec-label">Total outstanding</div>
    <div class="grand-total">
      <span class="grand-label">Grand Total</span>
      <span class="grand-amt" id="grand-amt">₹0</span>
    </div>
    <div class="sum-cards" id="sum-cards"></div>
    <div class="sec-label" style="margin-top:18px">Bill cycle status</div>
    <div id="bill-status"></div>
    <div class="sec-label" style="margin-top:18px">Spending by category</div>
    <div id="cat-prog"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var CATS = [
  {id:'Groceries',icon:'🛒'},{id:'Dining',icon:'🍽️'},{id:'Fuel',icon:'⛽'},
  {id:'Shopping',icon:'🛍️'},{id:'Travel',icon:'✈️'},{id:'Medical',icon:'💊'},
  {id:'Utilities',icon:'💡'},{id:'Insurance & EMI',icon:'🏦'},
  {id:'Hotel & Stay',icon:'🏨'},{id:'Kids & Baby',icon:'👶'},
  {id:'Home & Maintenance',icon:'🔧'},{id:'Gifts & Occasions',icon:'🎁'},
  {id:'Subscriptions',icon:'📱'},{id:'Other',icon:'📦'}
];
var CARDS = {
  hdfc:    {label:'HDFC',    badge:'badge-hdfc',    stmt:2,  due:22, nm:false},
  sbi:     {label:'SBI',     badge:'badge-sbi',     stmt:7,  due:27, nm:false},
  onecard: {label:'OneCard', badge:'badge-onecard', stmt:22, due:9,  nm:true}
};

var entries = [];
var activeCard = null;
var activeCat = null;
var logFilter = 'all';

function loadData() {
  try { entries = JSON.parse(localStorage.getItem('ct_v3') || '[]'); } catch(e) { entries = []; }
}
function saveData() {
  try { localStorage.setItem('ct_v3', JSON.stringify(entries)); } catch(e) {}
}

function pickCard(c) {
  activeCard = c;
  ['hdfc','sbi','onecard'].forEach(function(k) {
    var el = document.getElementById('co-'+k);
    el.className = 'card-opt' + (k === c ? ' sel-'+k : '');
  });
}

function pickCat(id) {
  activeCat = id;
  var all = document.querySelectorAll('.cat-opt');
  for (var i = 0; i < all.length; i++) all[i].classList.remove('active');
  var key = id.replace(/[\s&\/]+/g,'_');
  var el = document.getElementById('cat-'+key);
  if (el) el.classList.add('active');
}

function buildCatGrid() {
  var g = document.getElementById('cat-grid');
  var html = '';
  for (var i = 0; i < CATS.length; i++) {
    var c = CATS[i];
    var key = c.id.replace(/[\s&\/]+/g,'_');
    html += '<div class="cat-opt" id="cat-'+key+'" data-cat="'+c.id+'">'
      +'<span class="ci">'+c.icon+'</span>'+c.id+'</div>';
  }
  g.innerHTML = html;

  // attach events after building
  var opts = document.querySelectorAll('.cat-opt');
  for (var j = 0; j < opts.length; j++) {
    (function(el) {
      el.addEventListener('click', function() { pickCat(el.getAttribute('data-cat')); });
      el.addEventListener('touchend', function(e) { e.preventDefault(); pickCat(el.getAttribute('data-cat')); });
    })(opts[j]);
  }
}

function todayStr() {
  var d = new Date();
  return d.toISOString().split('T')[0];
}
function fmt(n) { return '₹'+Math.round(n).toLocaleString('en-IN'); }
function catIcon(id) {
  for (var i=0;i<CATS.length;i++) if (CATS[i].id===id) return CATS[i].icon;
  return '📦';
}
function ordinal(n) { var s=['th','st','nd','rd'],v=n%100; return s[(v-20)%10]||s[v]||s[0]; }

function addEntry() {
  var desc = document.getElementById('inp-desc').value.trim();
  var amt  = parseFloat(document.getElementById('inp-amt').value);
  var date = document.getElementById('inp-date').value || todayStr();
  if (!activeCard) { showToast('Please select a card'); return; }
  if (!activeCat)  { showToast('Please select a category'); return; }
  if (!desc)       { showToast('Add a description'); return; }
  if (!amt||amt<=0){ showToast('Enter a valid amount'); return; }
  entries.push({id:Date.now(), card:activeCard, cat:activeCat, desc:desc, amt:amt, date:date});
  saveData();
  document.getElementById('inp-desc').value = '';
  document.getElementById('inp-amt').value  = '';
  document.getElementById('inp-date').value = todayStr();
  showToast('Expense added ✓');
  updateHeader();
}

function delEntry(id) {
  if (!confirm('Delete this entry?')) return;
  entries = entries.filter(function(e){return e.id!==id;});
  saveData();
  renderLog();
  updateHeader();
}

function clearAll() {
  if (!confirm('Clear ALL entries? Cannot be undone.')) return;
  entries = [];
  saveData();
  renderLog();
  renderSummary();
  updateHeader();
}

function setFilter(f) {
  logFilter = f;
  var chips = document.querySelectorAll('.filter-chip');
  for (var i=0;i<chips.length;i++) {
    chips[i].classList.toggle('active', chips[i].getAttribute('data-filter')===f);
  }
  renderLog();
}

function renderLog() {
  var list = document.getElementById('log-list');
  var data = entries.slice().sort(function(a,b){return b.id-a.id;});
  if (logFilter !== 'all') data = data.filter(function(e){return e.card===logFilter;});
  if (!data.length) {
    list.innerHTML = '<div class="empty-state"><div class="ei">📭</div><p>No expenses yet.<br>Add one from the Add tab.</p></div>';
    return;
  }
  var html = '';
  for (var i=0;i<data.length;i++) {
    var e = data[i];
    var c = CARDS[e.card] || {};
    var d = e.date ? e.date.split('-').reverse().slice(0,2).join('/') : '';
    html += '<div class="entry-item">'
      +'<div class="entry-icon">'+catIcon(e.cat)+'</div>'
      +'<div class="entry-body">'
        +'<div class="entry-desc">'+e.desc+'</div>'
        +'<div class="entry-meta"><span class="badge '+(c.badge||'')+'">'+c.label+'</span>'
        +'<span>'+e.cat+'</span>·<span>'+d+'</span></div>'
      +'</div>'
      +'<div class="entry-right">'
        +'<div class="entry-amt">'+fmt(e.amt)+'</div>'
        +'<button class="del-btn" data-id="'+e.id+'">✕ remove</button>'
      +'</div></div>';
  }
  list.innerHTML = html;
  var delBtns = list.querySelectorAll('.del-btn');
  for (var j=0;j<delBtns.length;j++) {
    (function(btn) {
      btn.addEventListener('click', function() { delEntry(parseInt(btn.getAttribute('data-id'))); });
    })(delBtns[j]);
  }
}

function renderSummary() {
  var totals={hdfc:0,sbi:0,onecard:0}, catT={}, grand=0;
  for (var i=0;i<entries.length;i++) {
    var e=entries[i];
    totals[e.card]=(totals[e.card]||0)+parseFloat(e.amt);
    catT[e.cat]=(catT[e.cat]||0)+parseFloat(e.amt);
    grand+=parseFloat(e.amt);
  }
  document.getElementById('grand-amt').textContent = fmt(grand);
  var sumHtml='';
  var cardKeys=['hdfc','sbi','onecard'];
  for (var k=0;k<cardKeys.length;k++) {
    var key=cardKeys[k], v=CARDS[key];
    sumHtml+='<div class="sum-card"><div class="sum-card-label">'+v.label+'</div>'
      +'<div class="sum-card-amt">'+fmt(totals[key]||0)+'</div>'
      +'<div class="sum-card-sub">Due '+v.due+(v.nm?' →':'th')+'</div></div>';
  }
  document.getElementById('sum-cards').innerHTML = sumHtml;
  var day=new Date().getDate(), billHtml='';
  for (var m=0;m<cardKeys.length;m++) {
    var bk=cardKeys[m], bv=CARDS[bk], amt=totals[bk]||0;
    var ds=bv.stmt>=day?bv.stmt-day:31-day+bv.stmt;
    var cls=ds<=2?'due':ds<=6?'warn':'ok';
    var icon=ds<=2?'🔴':ds<=6?'🟡':'✅';
    billHtml+='<div class="bill-card '+cls+'"><div class="bill-top">'
      +'<span class="bill-name">'+icon+' '+bv.label+'</span>'
      +'<span class="bill-amt">'+fmt(amt)+'</span></div>'
      +'<div class="bill-detail">Statement in <strong>'+ds+' day'+(ds===1?'':'s')+'</strong>'
      +' ('+bv.stmt+ordinal(bv.stmt)+') · Due: '+bv.due+ordinal(bv.due)+(bv.nm?' next month':'')+'</div></div>';
  }
  document.getElementById('bill-status').innerHTML = billHtml;
  var catArr=[];
  for (var cat in catT) catArr.push([cat,catT[cat]]);
  catArr.sort(function(a,b){return b[1]-a[1];});
  var progHtml='';
  for (var p=0;p<catArr.length;p++) {
    var pcat=catArr[p][0],pamt=catArr[p][1],pct=grand>0?Math.round(pamt/grand*100):0;
    progHtml+='<div class="prog-item"><div class="prog-top">'
      +'<span class="prog-name">'+catIcon(pcat)+' '+pcat+'</span>'
      +'<span class="prog-val">'+fmt(pamt)+' · '+pct+'%</span></div>'
      +'<div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div></div>';
  }
  document.getElementById('cat-prog').innerHTML = progHtml || '<div style="color:var(--text3);font-size:13px;padding:10px 0">No data yet</div>';
}

function updateHeader() {
  var grand=0;
  for(var i=0;i<entries.length;i++) grand+=parseFloat(entries[i].amt);
  var d=new Date();
  document.getElementById('hdr-sub').textContent =
    d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})
    +' · '+entries.length+' entries · '+fmt(grand);
}

function switchTab(t) {
  var tabs=['add','log','summary'];
  for(var i=0;i<tabs.length;i++){
    document.getElementById('view-'+tabs[i]).classList.toggle('active',tabs[i]===t);
    document.getElementById('tab-'+tabs[i]).classList.toggle('active',tabs[i]===t);
  }
  if(t==='log') renderLog();
  if(t==='summary') renderSummary();
}

function showToast(msg) {
  var el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(function(){el.classList.remove('show');},2400);
}

// ATTACH ALL EVENTS HERE — no onclick in HTML
function attachEvents() {
  // Card buttons
  ['hdfc','sbi','onecard'].forEach(function(k) {
    var el = document.getElementById('co-'+k);
    el.addEventListener('click', function() { pickCard(k); });
    el.addEventListener('touchend', function(e) { e.preventDefault(); pickCard(k); });
  });

  // Tab buttons
  ['add','log','summary'].forEach(function(t) {
    var el = document.getElementById('tab-'+t);
    el.addEventListener('click', function() { switchTab(t); });
  });

  // Add button
  document.getElementById('add-btn').addEventListener('click', addEntry);

  // Clear button
  document.getElementById('clr-btn').addEventListener('click', clearAll);

  // Filter chips
  var chips = document.querySelectorAll('.filter-chip');
  for (var i=0;i<chips.length;i++) {
    (function(chip) {
      chip.addEventListener('click', function() { setFilter(chip.getAttribute('data-filter')); });
    })(chips[i]);
  }
}

// INIT
loadData();
buildCatGrid();
attachEvents();
document.getElementById('inp-date').value = todayStr();
updateHeader();
</script>
